<!DOCTYPE html>
<html lang="kk">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Kahoot — Damu AI</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="topbar"><div class="container nav"><a class="brand" href="index.html"><span class="brand-logo">📘</span> Damu AI</a></div></div>
<section class="page-hero"><div class="container"><a class="back-link" href="index.html">← Барлық курстар</a>
<div class="course-shell">
<div class="player-card"><h1>🧠 Kahoot курсы</h1><p>Kahoot арқылы викторина құру, тест жасау және нәтижелерді көру жолдары.</p>
<iframe id="video-kahoot" class="video-frame" src="https://www.youtube.com/embed/beAFx5XOJdw" allowfullscreen></iframe>
<div class="action-row"><button class="action complete" onclick="showDone('Kahoot')">Сабақты аяқтау</button><button class="action openquiz" onclick="toggleQuiz('quiz-kahoot')">Тестті ашу</button></div>
<div id="quiz-kahoot" class="quiz-box">
<div class="question"><p>1. Kahoot не үшін керек?</p><label><input type="radio" name="k1" value="1"> Тест пен викторина үшін</label><label><input type="radio" name="k1" value="0"> Видео монтаж үшін</label></div>
<div class="question"><p>2. Reports не көрсетеді?</p><label><input type="radio" name="k2" value="1"> Нәтиже</label><label><input type="radio" name="k2" value="0"> Ауа райы</label></div>
<div class="question"><p>3. Оқуда қолдануға бола ма?</p><label><input type="radio" name="k3" value="1"> Иә</label><label><input type="radio" name="k3" value="0"> Жоқ</label></div>
<button class="action openquiz" onclick="checkQuiz('k','result-kahoot',3)">Нәтижені көру</button><div id="result-kahoot" class="result">Нәтиже осында шығады.</div>
</div></div>
<div class="side-card"><div class="lesson-list">
<button class="lesson-btn active" onclick="setVideo('video-kahoot',this,'beAFx5XOJdw')">1-сабақ<small>Кіріспе</small></button>
<button class="lesson-btn" onclick="setVideo('video-kahoot',this,'5aCsxExhAV8')">2-сабақ<small>Сұрақ қосу</small></button>
<button class="lesson-btn" onclick="setVideo('video-kahoot',this,'beAFx5XOJdw')">3-сабақ<small>Ойын режимі</small></button>
<button class="lesson-btn" onclick="setVideo('video-kahoot',this,'5aCsxExhAV8')">4-сабақ<small>Reports</small></button>
</div></div>
</div></div></section>
<script src="site.js"></script>
</body>
</html>
