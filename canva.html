<p>Canva арқылы әдемі дизайн, пост, презентация және визуалды материалдар жасауды үйрен.</p>

<div class="question"><p>2. Шаблон не үшін керек?</p><label><input type="radio" name="c2" value="1"> Жұмысты тез бастау үшін</label><label><input type="radio" name="c2" value="0"> Сайтты өшіру үшін</label></div>
<div class="question"><p>3. Canva-да мәтін қосуға бола ма?</p><label><input type="radio" name="c3" value="1"> Иә</label><label><input type="radio" name="c3" value="0"> Жоқ</label></div>
<button class="action openquiz" onclick="checkQuiz('c','result-canva',3)">Нәтижені көру</button><div id="result-canva" class="result">Нәтиже осында шығады.</div>
