<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damu AI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 25px;
    font-size: 16px;
    transition: 0.3s;
}

nav a:hover {
    color: #00e0ff;
}

/* HERO */
.hero {
    text-align: center;
    margin-top: 100px;
}

.hero h1 {
    font-size: 60px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 20px;
    color: #d1d1d1;
}

/* BUTTONS */
.buttons {
    margin-top: 30px;
}

.btn {
    padding: 14px 28px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-primary {
    background: #00e0ff;
    color: black;
}

.btn-primary:hover {
    background: #00bcd4;
}

.btn-outline {
    background: transparent;
    border: 2px solid #00e0ff;
    color: #00e0ff;
}

.btn-outline:hover {
    background: #00e0ff;
    color: black;
}

/* ICONS */
.icons {
    display: flex;
    justify-content: center;
    margin-top: 80px;
    gap: 40px;
}

.icon-box {
    text-align: center;
}

.icon {
    font-size: 40px;
    margin-bottom: 10px;
}
</style>

</head>

<body>

<header>
    <div class="logo">🤖 Damu AI</div>

    <nav>
        <a href="#">Басты бет</a>
        <a href="#">Курстар</a>
        <a href="#">Damu AI</a>
    </nav>
</header>

<section class="hero">
    <h1>Damu AI</h1>
    <p>Заманауи AI құралдарын үйреніңіз: Canva, ChatGPT, Gemini</p>

    <div class="buttons">
        <button class="btn btn-primary">Курстарды қарау</button>
        <button class="btn btn-outline">Damu AI-мен танысу</button>
    </div>
</section>

<section class="icons">
    <div class="icon-box">
        <div class="icon">🎨</div>
        <p>Canva</p>
    </div>

    <div class="icon-box">
        <div class="icon">🤖</div>
        <p>ChatGPT</p>
    </div>

    <div class="icon-box">
        <div class="icon">✨</div>
        <p>Gemini</p>
    </div>
</section>

</body>
</html>
